<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MCA Admission Registration — Apply online for the MCA programme at the University of Jammu."
    />
    <title>Registration | MCA Department</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ===== Navbar ===== -->
    <nav class="navbar navbar-expand-md navbar-dark sticky-top">
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="index.html"
        >
          <span class="brand_icon">MCA</span> Univ. of Jammu
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#main_nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="main_nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html"
                ><i class="ph ph-house"></i> Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="registration.html"
                ><i class="ph ph-notebook"></i> Registration</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="students.html"
                ><i class="ph ph-users"></i> Student List</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ===== Registration Form ===== -->
    <section class="py-5">
      <div class="container">
        <h1 class="fw-bold mb-4">
          <i class="ph ph-identification-card"></i> Admission Registration
        </h1>

        <div class="form_wrapper p-4 rounded">
          <form id="registration_form" autocomplete="off" novalidate>
            <div class="mb-3">
              <label for="student_name" class="form-label fw-semibold"
                >Student Name</label
              >
              <input
                type="text"
                class="form-control"
                id="student_name"
                name="student_name"
                placeholder="e.g. Rahul Sharma"
                required
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-semibold"
                >Email Address</label
              >
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="e.g. rahul@example.com"
                required
              />
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label fw-semibold"
                >Phone Number</label
              >
              <input
                type="tel"
                class="form-control"
                id="phone"
                name="phone"
                placeholder="e.g. 9876543210"
                required
              />
            </div>

            <div class="mb-4">
              <label for="previous_degree" class="form-label fw-semibold"
                >Previous Degree</label
              >
              <select
                class="form-select"
                id="previous_degree"
                name="previous_degree"
                required
              >
                <option value="" disabled selected>Select your degree</option>
                <option value="BCA">BCA</option>
                <option value="B.Sc. Computer Science">
                  B.Sc. Computer Science
                </option>
                <option value="B.Tech. CSE">B.Tech. CSE</option>
                <option value="MCA">MCA</option>
                <option value="M.Tech. CSE">M.Tech. CSE</option>
              </select>
            </div>

            <button
              type="submit"
              class="btn btn-dark w-100 py-2 fw-semibold"
              id="submit_btn"
            >
              <i class="ph ph-paper-plane-tilt"></i> Submit Application
            </button>
          </form>

          <div class="text-muted text-center pt-3">
            Already submitted ?
            <a href="/students.html" class="link-primary fw-bold"
              >Click here to view</a
            >
          </div>
        </div>
      </div>
    </section>

    <!-- Toast -->
    <div class="toast_box" id="toast"></div>

    <!-- ===== Footer ===== -->
    <footer class="footer text-center text-light py-3">
      <div class="container">
        <small
          >&copy; 2026 MCA Department, University of Jammu. All rights
          reserved.</small
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
