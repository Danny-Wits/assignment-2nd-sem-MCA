<html>
<head><title>Practical 3 - Prime Check</title></head>
<body>
<h2>Prime Number Check</h2>
<input id="num" type="number" placeholder="Enter a number">
<button onclick="check()">Check</button>
<p id="res"></p>
<script>
function check(){
var n=+document.getElementById('num').value,prime=n>1;
for(var i=2;i<=Math.sqrt(n);i++){if(n%i==0){prime=false;break;}}
document.getElementById('res').innerText=n+(prime?" is Prime":" is Not Prime");
}
</script>
</body>
</html>
